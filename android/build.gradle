group = "io.github.eric.stft_fft_plugin"
version = "1.0"

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:7.3.0")
    }
}

rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: "com.android.library"

android {
    namespace = "io.github.eric.stft_fft_plugin"
    compileSdk = 34
    ndkVersion = android.ndkVersion

    defaultConfig {
        minSdk = 24
    }

    externalNativeBuild {
        cmake {
            path = "../src/CMakeLists.txt"
        }
    }
}
